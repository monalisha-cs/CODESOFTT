<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greener Login UI</title>
  <style>
    :root {
      --bg: #f7f8f3;
      --phone: #ffffff;
      --ink: #25332d;
      --muted: #87918b;
      --green: #6fb88a;
      --green-dark: #4d9c70;
      --green-soft: #dff1e6;
      --yellow: #fff3bc;
      --grey: #eef1ee;
      --line: #e3e8e2;
      --shadow: 0 22px 60px rgba(77, 103, 88, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 16%, rgba(255, 243, 188, 0.78) 0 13rem, transparent 13.2rem),
        radial-gradient(circle at 85% 82%, rgba(223, 241, 230, 0.95) 0 15rem, transparent 15.2rem),
        linear-gradient(135deg, #fbfcf7 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 42px 24px;
    }

    .presentation {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: clamp(18px, 3vw, 34px);
      align-items: center;
      justify-items: center;
    }

    .phone {
      width: min(100%, 330px);
      aspect-ratio: 9 / 18.7;
      position: relative;
      overflow: hidden;
      border-radius: 38px;
      background: var(--phone);
      box-shadow: var(--shadow);
      border: 10px solid #f9fbf8;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 50%;
      width: 78px;
      height: 19px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #edf1ed;
      z-index: 5;
    }

    .screen {
      min-height: 100%;
      position: relative;
      padding: 74px 25px 28px;
      display: flex;
      flex-direction: column;
    }

    .organic {
      position: absolute;
      inset: 0 0 auto;
      height: 205px;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 38% 62% 54% 46% / 48% 46% 54% 52%;
      background: var(--green-soft);
    }

    .blob.main {
      width: 255px;
      height: 190px;
      right: -62px;
      top: -64px;
      transform: rotate(-10deg);
    }

    .blob.yellow {
      width: 160px;
      height: 135px;
      left: -50px;
      top: 24px;
      background: var(--yellow);
      transform: rotate(18deg);
    }

    .blob.grey {
      width: 96px;
      height: 82px;
      right: 72px;
      top: 118px;
      background: var(--grey);
      opacity: 0.8;
      transform: rotate(28deg);
    }

    .leaf {
      position: absolute;
      width: 30px;
      height: 16px;
      border: 2px solid rgba(77, 156, 112, 0.45);
      border-radius: 100% 0 100% 0;
      transform: rotate(-32deg);
    }

    .leaf::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 1.5px;
      background: rgba(77, 156, 112, 0.38);
      top: 8px;
      left: 3px;
      transform: rotate(20deg);
      transform-origin: left center;
    }

    .leaf.one {
      top: 104px;
      left: 36px;
    }

    .leaf.two {
      top: 58px;
      right: 47px;
      transform: rotate(24deg) scale(0.86);
    }

    .leaf.three {
      bottom: 34px;
      right: 34px;
      transform: rotate(-10deg) scale(0.72);
    }

    .welcome-art {
      position: relative;
      height: 245px;
      margin: -4px -5px 8px;
    }

    .sprout {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 120px;
      height: 120px;
      transform: translateX(-50%);
    }

    .sprout::before {
      content: "";
      position: absolute;
      left: 58px;
      bottom: 12px;
      width: 4px;
      height: 78px;
      border-radius: 99px;
      background: var(--green);
      transform: rotate(-7deg);
    }

    .sprout span {
      position: absolute;
      width: 56px;
      height: 34px;
      border-radius: 100% 0 100% 0;
      background: #8cca9f;
      box-shadow: inset -8px -6px 0 rgba(77, 156, 112, 0.16);
    }

    .sprout .left {
      left: 11px;
      top: 28px;
      transform: rotate(-28deg);
    }

    .sprout .right {
      right: 4px;
      top: 6px;
      transform: rotate(76deg);
    }

    .content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.1;
      letter-spacing: 0;
      color: var(--ink);
    }

    .welcome h1 {
      max-width: 190px;
      font-size: 34px;
      margin-top: auto;
    }

    .subtext {
      margin: 13px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      gap: 13px;
      margin-top: 34px;
    }

    .button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      font: 700 15px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      cursor: default;
      display: grid;
      place-items: center;
    }

    .primary {
      color: #ffffff;
      background: var(--green);
      box-shadow: 0 14px 24px rgba(77, 156, 112, 0.28);
    }

    .secondary {
      color: var(--green-dark);
      background: #f5f8f4;
      border: 1px solid var(--line);
    }

    .top-space {
      height: 72px;
    }

    .auth h1 {
      margin-top: 16px;
    }

    .form {
      display: grid;
      gap: 14px;
      margin-top: 29px;
    }

    .field {
      min-height: 54px;
      border-radius: 17px;
      background: #f8faf7;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 16px;
      color: #9ba39d;
      font-size: 14px;
    }

    .field svg {
      width: 18px;
      height: 18px;
      stroke: #94a39a;
      flex: 0 0 auto;
    }

    .field .dots {
      color: #a0a9a2;
      letter-spacing: 3px;
      font-size: 18px;
      line-height: 1;
    }

    .auth .button {
      margin-top: 21px;
    }

    .fingerprint {
      width: 62px;
      height: 62px;
      border-radius: 23px;
      margin: 24px auto 0;
      border: 1px solid #cfe6d7;
      background: #f3fbf6;
      display: grid;
      place-items: center;
      color: var(--green-dark);
      box-shadow: 0 12px 28px rgba(93, 129, 105, 0.1);
    }

    .fingerprint svg,
    .photo svg {
      width: 29px;
      height: 29px;
      stroke: currentColor;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: auto 0 17px;
      color: #a1aaa4;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 13px;
    }

    .social {
      width: 45px;
      height: 45px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(80, 99, 86, 0.08);
      font-weight: 800;
      font-size: 16px;
    }

    .google {
      color: #dd5948;
    }

    .facebook {
      color: #3c68b1;
    }

    .twitter {
      color: #38a8d8;
    }

    .photo {
      width: 82px;
      height: 82px;
      border-radius: 30px;
      background: #f4fbf6;
      border: 1px dashed #a8d1b8;
      color: var(--green-dark);
      display: grid;
      place-items: center;
      margin: 2px auto 22px;
      box-shadow: inset 0 0 0 8px #fbfdfb;
    }

    .terms {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-top: 3px;
      color: #7c867f;
      font-size: 12px;
      line-height: 1.45;
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: var(--green);
      flex: 0 0 auto;
      position: relative;
      margin-top: 1px;
    }

    .check::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 3px;
      width: 6px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    @media (max-width: 920px) {
      .presentation {
        grid-template-columns: 1fr;
      }

      .phone {
        width: min(100%, 340px);
      }
    }
  </style>
</head>
<body>
  <main class="presentation" aria-label="Three mobile authentication screens">
    <section class="phone">
      <div class="screen welcome">
        <div class="organic">
          <span class="blob yellow"></span>
          <span class="blob main"></span>
          <span class="blob grey"></span>
          <span class="leaf one"></span>
          <span class="leaf two"></span>
        </div>

        <div class="content">
          <div class="welcome-art" aria-hidden="true">
            <div class="sprout">
              <span class="left"></span>
              <span class="right"></span>
            </div>
          </div>
          <h1>Hello, Greener</h1>
          <p class="subtext">Grow better habits with a calm space made for mindful living.</p>
          <div class="actions">
            <button class="button primary">Sign in</button>
            <button class="button secondary">Create New Account</button>
          </div>
        </div>
      </div>
    </section>

    <section class="phone">
      <div class="screen auth">
        <div class="organic">
          <span class="blob main"></span>
          <span class="blob yellow"></span>
          <span class="leaf two"></span>
        </div>

        <div class="content">
          <div class="top-space"></div>
          <h1>Welcome Back</h1>
          <p class="subtext">Sign in to continue your greener journey.</p>

          <form class="form">
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true">
                <path d="M4 6.5h16v11H4z"></path>
                <path d="m4.5 7 7.5 6 7.5-6"></path>
              </svg>
              Email address
            </label>
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
              </svg>
              <span class="dots">&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</span>
            </label>
          </form>

          <div class="fingerprint" aria-label="Fingerprint login">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
              <path d="M6.8 11.4a5.2 5.2 0 0 1 10.4 0"></path>
              <path d="M4.5 14.4V12a7.5 7.5 0 0 1 15 0v2.4"></path>
              <path d="M8.8 15.4v-3.2a3.2 3.2 0 0 1 6.4 0v2.4"></path>
              <path d="M12 12.2v7.2"></path>
              <path d="M8.5 18.5c.7.8 1.9 1.3 3.5 1.3 1.3 0 2.3-.3 3.1-.9"></path>
              <path d="M15.2 16.8c-.3.7-1.2 1.2-2.2 1.2"></path>
            </svg>
          </div>

          <button class="button primary">Sign in</button>

          <div class="divider">or connect with</div>
          <div class="socials" aria-label="Social login options">
            <span class="social google">G</span>
            <span class="social facebook">f</span>
            <span class="social twitter">t</span>
          </div>
        </div>
      </div>
    </section>

    <section class="phone">
      <div class="screen auth signup">
        <div class="organic">
          <span class="blob main"></span>
          <span class="blob yellow"></span>
          <span class="blob grey"></span>
          <span class="leaf three"></span>
        </div>

        <div class="content">
          <div class="photo" aria-label="Add profile photo">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 19h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3l-1.7-2h-4.6L8 6H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2Z"></path>
              <circle cx="12" cy="12.5" r="3.1"></circle>
              <path d="M18 10h.01"></path>
            </svg>
          </div>

          <h1>Create Account</h1>
          <p class="subtext">Start fresh with your personal plant care profile.</p>

          <form class="form">
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4.5 20a7.5 7.5 0 0 1 15 0"></path>
              </svg>
              Name
            </label>
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true">
                <path d="M4 6.5h16v11H4z"></path>
                <path d="m4.5 7 7.5 6 7.5-6"></path>
              </svg>
              Email address
            </label>
            <label class="field">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
              </svg>
              Password
            </label>
          </form>

          <div class="terms">
            <span class="check" aria-hidden="true"></span>
            <span>I agree with the terms and privacy policy.</span>
          </div>

          <button class="button primary">Sign up</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
